<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - SerratecFlix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

<header class="bg-gray-900 border-b border-purple-600 p-5 shadow-2xl">
    <div class="container mx-auto flex justify-center items-center">
        <h1 class="text-3xl font-black text-purple-500 tracking-wider font-mono">
            SERRATEC<span class="text-white">FLIX</span>
        </h1>
    </div>
</header>

<main class="container mx-auto px-4 py-10">
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-10">
        <div>
            <h2 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                Catálogo de Séries
            </h2>
            <p class="text-gray-400 text-sm mt-1">Dados reais consumidos da API SerratecFlix com capas dinâmicas via OMDb API.</p>
        </div>
        <button onclick="carregarSeries()" class="self-start bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-2.5 px-6 rounded-lg shadow-lg hover:shadow-purple-500/20 transition-all duration-300">
            🔄 Sincronizar Catálogo
        </button>
    </div>

    <div id="grid-series" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>
</main>

<script>
    // Aponta para o seu Controller no singular
    const API_LOCAL = 'http://localhost:8080/grid-series-data';
    // Chave pública gratuita da OMDb API para buscar os posters
    const OMDB_API_KEY = '5a59a414';

    // Função que vai na OMDb API buscar o poster pelo título da série
    async function buscarPoster(titulo) {
        try {
            // Remove espaços extras e limpa o título para a busca
            const tituloLimpo = titulo.trim();
            console.log("Buscando capa na OMDb para o título:", tituloLimpo);

            // Faz a busca na API de texto tradicional usando a sua chave gratuita
            const response = await fetch(`http://www.omdbapi.com/?t=${tituloLimpo}&apikey=${OMDB_API_KEY}`);
            const data = await response.json();

            console.log("Resposta da OMDb para " + tituloLimpo + ":", data);

            if (data.Response === "True" && data.Poster && data.Poster !== "N/A") {
                return data.Poster; // Retorna o link do pôster
            } else {
                console.warn("OMDb não encontrou poster para:", tituloLimpo);
            }
        } catch (err) {
            console.error("Erro na requisição da OMDb para: " + titulo, err);
        }
        // Imagem genérica se a busca falhar
        return 'https://media.istockphoto.com/id/1035527284/vector/404-not-found-glitch-text-anaglyph-3d-effect-technological-retro-background-disconnected-web.jpg?s=612x612&w=0&k=20&c=dubQl969oyH55wKlpcacI-3gpi3EsFhpJV9zdGw8kRs=';
    }

    async function carregarSeries() {
        const gridContainer = document.getElementById('grid-series');
        gridContainer.innerHTML =
            `<div class="text-center col-span-full py-12 text-purple-400 text-xl font-bold animate-bounce">
            Carregando as séries séries...
            </div>`;

        try {
            // Controller da serie
            const response = await fetch('http://localhost:8080/series');
            if (!response.ok) throw new Error('Erro na API Local. Verifique o preenchimento');

            const series = await response.json();
            gridContainer.innerHTML = '';

            if (series.length === 0) {
                gridContainer.innerHTML = `<div class="text-center col-span-full text-gray-500 py-12">Nenhuma série encontrada.</div>`;
                return;
            }

            // Monta os cards mapeando os nomes idênticos ao @JsonProperty na SerieResponseDTO
            for (const serie of series) {
                const titulo = serie.tituloSerie || "Série sem título";
                const doc_descricao = serie.descricaoSerie || "Sem descrição disponível.";
                const temporadas = serie.temporadas || 0;
                const episodios = serie.episodios || 0;
                const dataLancamento = serie.dataLancamento;
                const nota = serie.notaMediaSerie != null ? parseFloat(serie.notaMediaSerie) : 0.0;

                const listaCategoria = serie["Categoria"] || ["Geral"]
                const categoriaTexto = listaCategoria.join(", ");

                // Busca a capa na OMDb API usando o título
                const capaUrl = await buscarPoster(titulo);

                const card = `
                <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-xl hover:border-purple-500 transition-all duration-300 flex flex-col group">
                    <div class="h-72 overflow-hidden relative bg-gray-800">
                        <img src="${capaUrl}" alt="${titulo}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute top-3 right-3 bg-gray-950/80 backdrop-blur-md border border-yellow-500/30 text-yellow-400 text-xs font-black px-2.5 py-1 rounded-md shadow-lg">
                            ⭐ ${nota.toFixed(1)}
                        </div>
                    </div>

                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-[10px] text-purple-400 font-bold tracking-wider uppercase mb-1">${categoriaTexto}</span>
                        <h3 class="text-lg font-bold text-white tracking-wide mb-2 group-hover:text-purple-400 transition-colors">${titulo}</h3>
                        <p class="text-gray-400 text-xs line-clamp-3 mb-4 flex-grow">${doc_descricao}</p>

                        <div class="flex justify-center items-center text-[11px] font-mono text-gray-500 border-t border-gray-800 pt-3 mt-auto">
                            <span class="bg-gray-800 px-2 py-0.5 rounded text-gray-300">🎬 <b>${temporadas}</b> Temporadas</span>
                            <span class="bg-gray-800 px-2 py-0.5 rounded text-gray-300">📺 <b>${episodios}</b> Episódios</span>
                            <span class="bg-gray-800 px-2 py-0.5 rounded text-gray-300" >📅 ${dataLancamento ? new Date(dataLancamento).getFullYear() : 'N/A'}</span>
                        </div>
                    </div>
                </div>
            `;
                gridContainer.innerHTML += card;
            }

        } catch (error) {
            console.error("Erro capturado no fetch: ", error);
            gridContainer.innerHTML = `
            <div class="bg-red-950/40 border border-red-500 text-red-400 p-5 rounded-xl col-span-full text-center font-bold">
                ⚠️ Erro ao carregar o catálogo. Certifique-se de que o banco está criado e o Spring Boot está rodando!
            </div>
        `;
        }
    }

    window.onload = carregarSeries;
</script>
</body>
</html>
